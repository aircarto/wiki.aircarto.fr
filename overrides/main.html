{% extends "base.html" %}

{% block content %}
  {{ super() }}

  <h2 id="__comments">Questions / Commentaires</h2>
  <script
    src="https://giscus.app/client.js"
    data-repo="aircarto/wiki.aircarto.fr"
    data-repo-id="R_kgDORk-Igg"
    data-category="Q&A"
    data-category-id="DIC_kwDORk-Igs4C4OCo"
    data-mapping="pathname"
    data-strict="1"
    data-reactions-enabled="1"
    data-emit-metadata="0"
    data-input-position="top"
    data-theme="light"
    data-lang="fr"
    data-loading="lazy"
    crossorigin="anonymous"
    async>
  </script>

  <script>
    function getGiscusTheme() {
      var palette = document.body.getAttribute("data-md-color-scheme");
      return palette === "slate" ? "dark" : "light";
    }

    function setGiscusTheme() {
      var iframe = document.querySelector("iframe.giscus-frame");
      if (iframe) {
        iframe.contentWindow.postMessage(
          { giscus: { setConfig: { theme: getGiscusTheme() } } },
          "https://giscus.app"
        );
      }
    }

    // Set theme on load
    var observer = new MutationObserver(function() {
      var iframe = document.querySelector("iframe.giscus-frame");
      if (iframe) {
        setGiscusTheme();
        observer.disconnect();
      }
    });
    observer.observe(document.body, { childList: true, subtree: true });

    // Watch for theme toggle
    new MutationObserver(function() {
      setGiscusTheme();
    }).observe(document.body, { attributeFilter: ["data-md-color-scheme"] });
  </script>
{% endblock %}

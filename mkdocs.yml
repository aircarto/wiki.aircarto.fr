site_name: AirCarto Wiki
site_url: https://wiki.aircarto.fr
site_description: Wiki AirCarto - Documentation et ressources

theme:
  name: material
  language: fr
  logo: assets/images/logo.png
  favicon: assets/images/logo.png
  palette:
    - scheme: default
      primary: white
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Mode sombre
    - scheme: slate
      primary: white
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Mode clair
  custom_dir: overrides
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy

extra_css:
  - assets/stylesheets/custom.css

plugins:
  - search:
      lang: fr

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true

nav:
  - Accueil: index.md
  - ModuleAir:
    - WiFi: moduleair-wifi/index.md
    - Pro: moduleair-pro/index.md
  - NebuleAir:
    - WiFi: nebuleair-wifi/index.md
    - Pro: nebuleair-pro/index.md
  - Edu Kit: edukit/index.md
  - MobileAir: mobileair/index.md
